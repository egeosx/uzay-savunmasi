<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piksel Uzay Savunması: Efsanevi Bosslar</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            display: flex;
            height: 100vh;
            color: yellow;
            font-family: 'Press Start 2P', monospace;
        }

        /* SOL PANEL */
        #sidebar {
            width: 320px;
            border-right: 4px solid cyan;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 40px;
            background-color: #111;
            z-index: 10;
        }

        #sidebar h1 { margin: 0 0 15px 0; font-size: 1.5rem; color: yellow; }

        #hearts {
            display: flex;
            gap: 5px;
        }
        .heart-container {
            position: relative;
            width: 28px;
            height: 28px;
        }
        .heart-img {
            position: absolute;
            top: 0; left: 0;
            width: 28px;
            height: 28px;
            image-rendering: pixelated;
        }
        .heart-empty {
            filter: grayscale(100%) opacity(30%);
        }

        .bar-container { display: flex; align-items: center; gap: 15px; }
        #powerBarOuter {
            width: 100%; height: 25px; border: 4px solid yellow; background-color: #333; position: relative;
        }
        #powerBarInner {
            height: 100%; width: 0%; background-color: yellow; transition: width 0.2s;
        }
        #f-key { font-size: 2rem; }
        #powerText { font-size: 0.7rem; line-height: 1.5; margin-top: 10px; }
        #levelText { font-size: 1rem; color: lime; margin-top: auto; line-height: 1.5;}

        /* OYUN ALANI */
        #gameArea {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background-color: #000; padding: 20px; box-sizing: border-box; position: relative;
        }
        canvas {
            max-height: 95vh; max-width: 100%; aspect-ratio: 3 / 4;
            background-color: #000; border: 4px solid cyan;
            image-rendering: pixelated; box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
        }

        /* EKRANLAR */
        #messageScreen {
            position: absolute; text-align: center; display: none;
            background: rgba(0, 0, 0, 0.95); padding: 30px; border: 4px solid cyan;
            box-shadow: 0 0 30px cyan; z-index: 100;
        }
        #messageScreen h1 { margin: 0 0 20px 0; font-size: 2.2rem; color: red; line-height: 1.3;}
        #messageScreen p { margin: 0 0 30px 0; font-size: 0.8rem; color: #fff; line-height: 1.5; }
        button {
            font-family: 'Press Start 2P', monospace; background-color: yellow; color: black;
            border: 4px solid white; padding: 15px; font-size: 0.8rem; cursor: pointer; margin: 10px;
        }
        button:hover { background-color: white; color: black; border-color: yellow; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div>
            <h1>HEALTH</h1>
            <div id="hearts"></div>
        </div>

        <div>
            <div class="bar-container">
                <div id="powerBarOuter"><div id="powerBarInner"></div></div>
                <div id="f-key">F</div>
            </div>
            <p id="powerText">Özel güç barı (0/50)</p>
        </div>

        <div id="levelText">LEVEL: 1</div>
    </div>

    <div id="gameArea">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="messageScreen">
            <h1 id="titleText">OYUN BİTTİ</h1>
            <p id="subText">Uzay gemin paramparça oldu...</p>
            <button id="restartBtn" onclick="restartGame()">Tekrar Oyna</button>
            <button id="nextLevelBtn" onclick="nextLevel()" style="display: none;">Sonraki Seviye</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgScreen = document.getElementById('messageScreen');
        const titleText = document.getElementById('titleText');
        const subText = document.getElementById('subText');
        const restartBtn = document.getElementById('restartBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const heartsEl = document.getElementById('hearts');
        const powerBarInner = document.getElementById('powerBarInner');
        const fKeyEl = document.getElementById('f-key');
        const powerTextEl = document.getElementById('powerText');
        const levelTextEl = document.getElementById('levelText');

        // Klavye
        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; if(e.key === ' ') e.preventDefault(); });
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // --- BOSS DATA ---
        const bossList = [
            null,
            { name: "RONUSOL", maxHp: 100 },      
            { name: "JOHNOCTOBER", maxHp: 150 },  
            { name: "XYLOK", maxHp: 120 },        
            { name: "VEXIRA", maxHp: 250 },       
            { name: "MALACOR", maxHp: 300 },      
            { name: "CYPHER", maxHp: 350 },       
            { name: "KRYTON", maxHp: 400 },       
            { name: "NEBULON", maxHp: 450 },      
            { name: "DRAXUS", maxHp: 500 },       
            { name: "THE CORE", maxHp: 1000 }     
        ];

        let gameState = 'playing'; 
        let level = 1;
        let lives = 5; 
        let meteorDestroyed = 0;
        let specialReady = false;
        let specialActive = false;
        let frameCount = 0;
        let level4EasterEggTimer = 0;
        
        let isMiniBossRound = false;
        let miniBossSpawned = false;

        let player = {};
        let bullets = [];
        let meteors = [];
        let particles = [];
        let bossBullets = [];
        let miniBosses = [];
        let allies = [];
        let allyMissiles = []; // Level 5 Müttefiki Isı Güdümlü Füzeler
        let boss = {};

        function initGame(keepLevel = false) {
            if(!keepLevel) { level = 1; allies = []; }
            
            lives = 5;
            meteorDestroyed = 0;
            specialReady = false;
            specialActive = false;
            frameCount = 0;
            
            // Easter Egg Level 4'te başlatılır (60fps * 10 sn = 600 kare)
            level4EasterEggTimer = (level === 4) ? 600 : 0;
            
            isMiniBossRound = Math.random() < 0.15;
            miniBossSpawned = false;
            
            bullets = []; meteors = []; particles = []; bossBullets = []; miniBosses = []; allyMissiles = [];

            player = { 
                x: canvas.width / 2, 
                y: canvas.height - 80, 
                width: 30, 
                speed: 6 + (level * 0.3), 
                cooldown: 0, 
                invulnerable: 0, 
                forcefield: 0 
            };

            let bData = bossList[level];
            boss = {
                active: false, secondForm: false, name: bData.name,
                x: canvas.width / 2, y: -150, width: 120, height: 100,
                maxHp: bData.maxHp, hp: bData.maxHp,
                speed: 1.5 + (level * 0.2), direction: 1, cooldown: 0, targetY: 120,
                freezeTimer: 0 // Yeni Dondurma Mekaniği
            };

            allies.forEach(a => { a.x = player.x; a.y = player.y + 50; });

            gameState = 'playing';
            msgScreen.style.display = 'none';
            levelTextEl.innerHTML = `LEVEL: ${level}<br><span style="font-size:0.6rem; color:#aaa;">Gemi Svl: ${level >= 5 ? 'MAX' : (level >= 3 ? '2' : '1')}</span>`;
            updateUI();
            
            if(!window.animationId) animate();
        }

        function restartGame() { initGame(false); }
        function nextLevel() { 
            if(level < 10) { level++; initGame(true); } 
            else { location.reload(); } 
        }

        function updateUI() {
            heartsEl.innerHTML = "";
            for(let i=1; i<=5; i++) {
                let container = document.createElement('div');
                container.className = "heart-container";

                let bgImg = document.createElement('img');
                bgImg.src = "image_29719c.png"; 
                bgImg.className = "heart-img heart-empty";
                container.appendChild(bgImg);

                if (lives >= i - 0.5) {
                    let fgImg = document.createElement('img');
                    fgImg.src = "image_29719c.png"; 
                    fgImg.className = "heart-img";
                    if (lives === i - 0.5) {
                        fgImg.style.clipPath = "polygon(0 0, 50% 0, 50% 100%, 0 100%)";
                    }
                    container.appendChild(fgImg);
                }
                heartsEl.appendChild(container);
            }

            if (specialActive) {
                powerBarInner.style.width = "100%"; powerBarInner.style.backgroundColor = "cyan";
                fKeyEl.style.color = "cyan"; powerTextEl.innerText = "GUC AKTIF!"; powerTextEl.style.color = "cyan";
            } else {
                let ratio = Math.min(meteorDestroyed / 50, 1);
                powerBarInner.style.width = (ratio * 100) + "%"; powerBarInner.style.backgroundColor = "yellow";
                if (meteorDestroyed >= 50) {
                    specialReady = true;
                    fKeyEl.style.color = Math.floor(frameCount / 20) % 2 === 0 ? "lime" : "yellow"; 
                    powerTextEl.innerText = "HAZIR! F'ye BAS"; powerTextEl.style.color = "lime";
                } else {
                    fKeyEl.style.color = "yellow"; powerTextEl.style.color = "yellow";
                    powerTextEl.innerText = `METEOR (${meteorDestroyed}/50)`;
                }
            }
        }

        function drawShip(x, y, isUpgraded) {
            ctx.save(); ctx.translate(x, y); let s = 3;
            if (player.forcefield > 0) {
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2);
                ctx.strokeStyle = "rgba(0, 255, 255, 0.6)"; ctx.lineWidth = 4; ctx.stroke();
                ctx.fillStyle = "rgba(0, 255, 255, 0.2)"; ctx.fill();
            }

            if (!isUpgraded) {
                ctx.fillStyle = '#aaa'; ctx.fillRect(-2*s, -8*s, 4*s, 12*s); ctx.fillRect(-6*s, 0, 12*s, 4*s); 
                ctx.fillStyle = 'cyan'; ctx.fillRect(-1*s, -4*s, 2*s, 3*s); 
                ctx.fillStyle = 'orange'; ctx.fillRect(-1*s, 4*s, 2*s, Math.random()*3*s + 2*s); 

                if (level >= 3) {
                    ctx.fillStyle = '#888'; ctx.fillRect(-8*s, 0, 2*s, 4*s); ctx.fillRect(6*s, 0, 2*s, 4*s);
                }
                if (level >= 5) {
                    ctx.fillStyle = '#666'; ctx.fillRect(-10*s, 2*s, 4*s, 4*s); ctx.fillRect(6*s, 2*s, 4*s, 4*s);
                    ctx.fillStyle = 'lime'; ctx.fillRect(-2*s, -6*s, 4*s, 2*s);
                }

            } else {
                ctx.fillStyle = '#222'; ctx.fillRect(-3*s, -10*s, 6*s, 14*s); ctx.fillRect(-9*s, -2*s, 18*s, 6*s); 
                ctx.fillStyle = '#ff007f'; ctx.fillRect(-8*s, -6*s, 2*s, 6*s); ctx.fillRect(6*s, -6*s, 2*s, 6*s); 
                ctx.fillStyle = 'yellow'; ctx.fillRect(-2*s, -5*s, 4*s, 4*s);
                ctx.fillStyle = 'cyan'; ctx.fillRect(-2*s, 4*s, 4*s, Math.random()*5*s + 3*s); 
            }
            ctx.restore();
        }

        function drawBossDesign(id, s) {
            if (id === 1) { 
                ctx.fillStyle = '#2ecc71'; ctx.fillRect(-12*s, -10*s, 24*s, 16*s); ctx.fillStyle = '#27ae60'; ctx.fillRect(-2*s, -14*s, 4*s, 4*s); 
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(-11*s, -4*s, 3*s, 5*s); ctx.fillRect(-6*s, -5*s, 4*s, 7*s); ctx.fillRect(2*s, -5*s, 4*s, 7*s); ctx.fillRect(8*s, -4*s, 3*s, 5*s);
                ctx.fillStyle = '#c0392b'; ctx.fillRect(-10*s, -2*s, 1.5*s, 1.5*s); ctx.fillRect(-5*s, -2*s, 2*s, 2*s); ctx.fillRect(3*s, -2*s, 2*s, 2*s); ctx.fillRect(8.5*s, -2*s, 1.5*s, 1.5*s);
                ctx.fillStyle = '#27ae60'; let tOffset = Math.sin(frameCount / 10) * s * 1.5;
                ctx.fillRect(-10*s, 6*s, 3*s, 8*s + tOffset); ctx.fillRect(-4*s, 6*s, 3*s, 10*s - tOffset); ctx.fillRect(1*s, 6*s, 3*s, 10*s + tOffset); ctx.fillRect(7*s, 6*s, 3*s, 8*s - tOffset);
            } else if (id === 2) { 
                ctx.fillStyle = '#3498db'; ctx.fillRect(-10*s, -10*s, 20*s, 20*s);
                ctx.fillStyle = '#bdc3c7'; ctx.fillRect(-12*s, -2*s, 2*s, 6*s); ctx.fillRect(10*s, -2*s, 2*s, 6*s); 
                ctx.fillStyle = '#e74c3c'; ctx.fillRect(-6*s, -4*s, 4*s, 4*s); ctx.fillRect(2*s, -4*s, 4*s, 4*s); 
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(-4*s, 4*s, 8*s, 2*s); 
            } else if (id === 3) { 
                ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.moveTo(0, -15*s); ctx.lineTo(12*s, 0); ctx.lineTo(0, 15*s); ctx.lineTo(-12*s, 0); ctx.fill();
                ctx.fillStyle = 'white'; ctx.fillRect(-2*s, -2*s, 4*s, 4*s);
            } else if (id === 4) { 
                ctx.fillStyle = '#9b59b6'; ctx.beginPath(); ctx.ellipse(0, 0, 15*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(0, 0, 6*s, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(0, 0, 3*s, 0, Math.PI*2); ctx.fill();
            } else if (id === 5) { 
                ctx.fillStyle = '#e67e22'; ctx.fillRect(-10*s, -10*s, 20*s, 15*s); ctx.fillRect(-6*s, 5*s, 12*s, 5*s);
                ctx.fillStyle = 'black'; ctx.fillRect(-6*s, -4*s, 4*s, 4*s); ctx.fillRect(2*s, -4*s, 4*s, 4*s);
            } else if (id === 6) { 
                ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.ellipse(0, 2*s, 15*s, 6*s, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(0, -2*s, 8*s, Math.PI, 0); ctx.fill();
            } else if (id === 7) { 
                ctx.fillStyle = '#1abc9c'; ctx.beginPath(); ctx.arc(-5*s, -5*s, 8*s, 0, Math.PI*2); ctx.arc(5*s, -5*s, 8*s, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(-12*s, -12*s, 24*s, 24*s);
            } else if (id === 8) { 
                ctx.fillStyle = '#ecf0f1';
                for(let i=0; i<4; i++) { ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.moveTo(0, -15*s); ctx.lineTo(4*s, -4*s); ctx.lineTo(-4*s, -4*s); ctx.fill(); }
            } else if (id === 9) { 
                ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(0, 0, 10*s, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(-12*s, -5*s, 6*s, 0, Math.PI*2); ctx.arc(12*s, -5*s, 6*s, 0, Math.PI*2); ctx.fill();
            } else if (id === 10) { 
                let pulse = Math.sin(frameCount/5)*2*s;
                ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(0, 0, 20*s + pulse, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(0, 0, 10*s, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawBoss() {
            if (!boss.active) return;
            ctx.save(); ctx.translate(boss.x, boss.y);
            
            if (boss.freezeTimer > 0) {
                ctx.shadowBlur = 20; ctx.shadowColor = 'cyan';
            } else if (boss.secondForm) {
                ctx.shadowBlur = 30; ctx.shadowColor = 'red';
                ctx.strokeStyle = 'red'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, 60 + Math.random()*10, 0, Math.PI*2); ctx.stroke();
            }

            drawBossDesign(level, boss.secondForm ? 6 : 5); 

            // Boss Buz İçinde (Donma Efekti)
            if (boss.freezeTimer > 0) {
                ctx.fillStyle = 'rgba(0, 255, 255, 0.4)';
                ctx.fillRect(-70, -60, 140, 120); 
            }

            ctx.restore();

            ctx.fillStyle = '#333'; ctx.fillRect(boss.x - 60, boss.y - 90, 120, 10);
            ctx.fillStyle = boss.secondForm ? '#ff0000' : '#e74c3c';
            let hpWidth = (boss.hp / boss.maxHp) * 120;
            ctx.fillRect(boss.x - 60, boss.y - 90, Math.max(0, hpWidth), 10);
            
            // İsim ve Durum Göstergesi
            ctx.fillStyle = boss.freezeTimer > 0 ? 'cyan' : 'lime'; 
            ctx.font = '10px "Press Start 2P"'; ctx.textAlign = 'center';
            let bName = boss.name + (boss.secondForm ? " (RAGE)" : "");
            if (boss.freezeTimer > 0) bName = "FROZEN!";
            ctx.fillText(bName, boss.x, boss.y - 100);
        }

        function drawMiniBosses() {
            miniBosses.forEach(mb => {
                ctx.save(); ctx.translate(mb.x, mb.y); let s = 3;
                ctx.fillStyle = '#8e44ad'; ctx.fillRect(-6*s, -4*s, 12*s, 8*s);
                ctx.fillStyle = '#e67e22'; ctx.fillRect(-2*s, -2*s, 4*s, 4*s);
                ctx.restore();
            });
        }

        function drawMeteors() {
            for (let m of meteors) {
                ctx.fillStyle = m.color; ctx.fillRect(m.x - m.radius, m.y - m.radius, m.radius*2, m.radius*2);
                ctx.fillStyle = '#444'; ctx.fillRect(m.x - m.radius/2, m.y - m.radius/2, m.radius/2, m.radius/2);
            }
        }

        function handlePlayer() {
            if (keys['w'] && player.y > 50) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height - 30) player.y += player.speed;
            if (keys['a'] && player.x > 30) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width - 30) player.x += player.speed;

            if (keys[' '] && player.cooldown <= 0) {
                if (specialActive) {
                    let spd = 15, ang = 15 * Math.PI / 180; 
                    bullets.push({ x: player.x, y: player.y - 30, vx: 0, vy: -spd, size: 6, color: 'cyan', pierce: false });
                    bullets.push({ x: player.x, y: player.y - 20, vx: spd * Math.sin(-ang), vy: -spd * Math.cos(-ang), size: 6, color: '#ff007f', pierce: false });
                    bullets.push({ x: player.x, y: player.y - 20, vx: spd * Math.sin(ang), vy: -spd * Math.cos(ang), size: 6, color: '#ff007f', pierce: false });
                    player.cooldown = 10;
                } else {
                    let spd = 12 + (level * 0.5);
                    if (level < 3) {
                        bullets.push({ x: player.x, y: player.y - 25, vx: 0, vy: -spd, size: 5, color: 'yellow', pierce: false });
                    } else if (level < 5) {
                        bullets.push({ x: player.x - 6, y: player.y - 25, vx: 0, vy: -spd, size: 5, color: '#f1c40f', pierce: false });
                        bullets.push({ x: player.x + 6, y: player.y - 25, vx: 0, vy: -spd, size: 5, color: '#f1c40f', pierce: false });
                    } else {
                        let ang = 8 * Math.PI / 180;
                        bullets.push({ x: player.x, y: player.y - 25, vx: 0, vy: -spd, size: 6, color: '#e67e22', pierce: false });
                        bullets.push({ x: player.x - 8, y: player.y - 20, vx: -spd * Math.sin(ang), vy: -spd * Math.cos(ang), size: 5, color: '#f1c40f', pierce: false });
                        bullets.push({ x: player.x + 8, y: player.y - 20, vx: spd * Math.sin(ang), vy: -spd * Math.cos(ang), size: 5, color: '#f1c40f', pierce: false });
                    }
                    player.cooldown = Math.max(6, 15 - level);
                }
            }
            if (player.cooldown > 0) player.cooldown--;
            if (player.forcefield > 0) player.forcefield--;

            if (keys['f'] && specialReady && !specialActive) {
                specialActive = true; boss.active = true; meteors.length = 0; miniBosses.length = 0;
                createExplosion(player.x, player.y, 'cyan', 50); 
            }

            if (player.invulnerable > 0) player.invulnerable--;
            if (player.invulnerable === 0 || Math.floor(Date.now() / 100) % 2 === 0) drawShip(player.x, player.y, specialActive);
        }

        function handleMiniBosses() {
            if (isMiniBossRound && !miniBossSpawned && !boss.active && meteorDestroyed > 10 && meteorDestroyed < 40) {
                if (Math.random() < 0.01) {
                    miniBosses.push({ x: Math.random() * (canvas.width-60)+30, y: -20, hp: 5, maxHp: 5, direction: 1, cooldown: 0 });
                    miniBossSpawned = true;
                }
            }

            miniBosses.forEach((mb, i) => {
                mb.y += mb.y < 80 ? 1 : 0; 
                mb.x += 2 * mb.direction;
                if(mb.x < 30 || mb.x > canvas.width-30) mb.direction *= -1;

                if (mb.cooldown <= 0) {
                    bossBullets.push({ x: mb.x, y: mb.y+20, vx: 0, vy: 4.5, radius: 6, color: '#e67e22' });
                    mb.cooldown = 120;
                } else mb.cooldown--;
            });
            drawMiniBosses();
        }

        function handleAllies() {
            allies.forEach((ally, index) => {
                let offsetX = (index % 2 === 0 ? 1 : -1) * (40 + Math.floor(index/2)*30);
                let targetX = player.x + offsetX;
                let targetY = player.y + 40;
                ally.x += (targetX - ally.x) * 0.1; ally.y += (targetY - ally.y) * 0.1;

                ctx.save(); ctx.translate(ally.x, ally.y);
                drawBossDesign(ally.level, 1.5); 
                ctx.restore();

                if (ally.level === 1 && frameCount % 120 === 0) { 
                    bullets.push({ x: ally.x, y: ally.y-10, vx: 0, vy: -15, size: 4, color: '#2ecc71', pierce: false });
                }
                else if (ally.level === 2 && frameCount % 1800 === 0) { 
                    player.forcefield = 300; 
                }
                else if (ally.level === 3 && frameCount % 90 === 0) { 
                    bullets.push({ x: ally.x, y: ally.y-10, vx: -3, vy: -10, size: 4, color: '#e74c3c', pierce: false });
                    bullets.push({ x: ally.x, y: ally.y-10, vx: 3, vy: -10, size: 4, color: '#e74c3c', pierce: false });
                }
                else if (ally.level === 4 && frameCount % 180 === 0) { 
                    bullets.push({ x: ally.x, y: ally.y-10, vx: 0, vy: -20, size: 6, color: '#9b59b6', pierce: true });
                }
                // LEVEL 5 MÜTTEFİK (MALACOR) - %100 İsabetli, Hasar Veren ve Donduran Homing Missile
                else if (ally.level === 5 && boss.active && frameCount % 900 === 0) { 
                    allyMissiles.push({ x: ally.x, y: ally.y, speed: 10, color: '#e67e22' });
                }
            });
        }

        function handleProjectiles() {
            for (let i = 0; i < bullets.length; i++) {
                let b = bullets[i]; b.x += b.vx; b.y += b.vy; ctx.fillStyle = b.color;
                ctx.fillRect(b.x - b.size/2, b.y - b.size, b.size, b.size*2);
                if (b.y < 0 || b.x < 0 || b.x > canvas.width) { bullets.splice(i, 1); i--; }
            }
            for (let i = 0; i < bossBullets.length; i++) {
                let b = bossBullets[i]; b.x += b.vx; b.y += b.vy; ctx.fillStyle = b.color || 'lime'; 
                ctx.fillRect(b.x - b.radius/2, b.y - b.radius/2, b.radius, b.radius);
                if (b.y > canvas.height) { bossBullets.splice(i, 1); i--; }
            }

            // LEVEL 5 MÜTTEFİK FÜZELERİ 
            for (let i = 0; i < allyMissiles.length; i++) {
                let m = allyMissiles[i];
                if (boss.active) {
                    let dx = boss.x - m.x;
                    let dy = boss.y - m.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist > 0) {
                        m.x += (dx / dist) * m.speed;
                        m.y += (dy / dist) * m.speed;
                    }
                    
                    // Füze çizimi
                    ctx.fillStyle = m.color;
                    ctx.fillRect(m.x - 4, m.y - 10, 8, 20);
                    ctx.fillStyle = 'orange'; // Ateş efekti
                    ctx.fillRect(m.x - 2, m.y + 10, 4, Math.random()*10+5);

                    // Boss ile Çarpışma
                    if (dist < 30) {
                        createExplosion(m.x, m.y, '#e67e22', 30);
                        boss.hp -= 40; // Çok iyi hasar
                        boss.freezeTimer = 180; // 3 Saniye Dondur
                        allyMissiles.splice(i, 1);
                        i--;
                        
                        if (boss.hp <= 0) {
                            boss.active = false;
                            createExplosion(boss.x, boss.y, 'white', 150);
                            endGame(true);
                        }
                    }
                } else {
                    // Boss yoksa yukarı doğru uçup kaybolur
                    m.y -= m.speed;
                    ctx.fillStyle = m.color;
                    ctx.fillRect(m.x - 4, m.y - 10, 8, 20);
                    if (m.y < 0) { allyMissiles.splice(i, 1); i--; }
                }
            }
        }

        function handleMeteors() {
            let baseChance = 0.03;
            if (miniBosses.length > 0) baseChance = 0.015; 

            let speedMultiplier = 1 + (frameCount * 0.0005) + (level * 0.1); 

            if (!boss.active && Math.random() < baseChance) { 
                let r = Math.floor(Math.random() * 15 + 10);
                let colors = ['#8b8c89', '#7a7a7a', '#555'];
                meteors.push({
                    x: Math.random() * canvas.width, y: -50, radius: r,
                    speed: (Math.random() * 1.5 + 1) * speedMultiplier, color: colors[Math.floor(Math.random() * colors.length)]
                });
            }

            for (let i = 0; i < meteors.length; i++) {
                let m = meteors[i]; m.y += m.speed; 
                if (m.y > canvas.height + 50) { meteors.splice(i, 1); i--; }
            }
            drawMeteors();
        }

        function handleBoss() {
            if (!boss.active) return;

            // Dondurulmuş Boss Mantığı (Füze Yediğinde)
            if (boss.freezeTimer > 0) {
                boss.freezeTimer--;
                drawBoss();
                return; // Donukken ne hareket edebilir ne de ateş edebilir!
            }

            if (boss.hp <= boss.maxHp * 0.10 && !boss.secondForm) {
                boss.secondForm = true;
                boss.maxHp *= 1.5; 
                boss.hp = boss.maxHp; 
                boss.speed *= 1.5; 
                createExplosion(boss.x, boss.y, 'red', 100); 
            }

            if (boss.y < boss.targetY) { boss.y += 1; return; }

            boss.x += boss.speed * boss.direction;
            if (boss.x < 80 || boss.x > canvas.width - 80) boss.direction *= -1;

            if (boss.cooldown <= 0) {
                let dx = player.x - boss.x, dy = player.y - boss.y;
                let angle = Math.atan2(dy, dx);
                let speed = 4 + (level * 0.5) + (boss.secondForm ? 1 : 0); 
                
                bossBullets.push({ x: boss.x, y: boss.y + 40, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius: 12, color: boss.secondForm ? 'red' : 'lime' });
                
                if(boss.secondForm) {
                    bossBullets.push({ x: boss.x, y: boss.y + 40, vx: Math.cos(angle+0.3) * speed, vy: Math.sin(angle+0.3) * speed, radius: 8, color: 'red' });
                    bossBullets.push({ x: boss.x, y: boss.y + 40, vx: Math.cos(angle-0.3) * speed, vy: Math.sin(angle-0.3) * speed, radius: 8, color: 'red' });
                }

                boss.cooldown = Math.max(30, 80 - (level * 5) - (boss.secondForm ? 5 : 0));
                if (level === 3) boss.cooldown += 30; 

            } else { boss.cooldown--; }

            drawBoss();
        }

        function checkCollisions() {
            for (let i = 0; i < bullets.length; i++) {
                for (let j = 0; j < meteors.length; j++) {
                    let b = bullets[i], m = meteors[j];
                    if (Math.abs(b.x - m.x) < m.radius + b.size && Math.abs(b.y - m.y) < m.radius + b.size) {
                        createExplosion(m.x, m.y, m.color, 8);
                        if (!b.pierce) { bullets.splice(i, 1); i--; } 
                        meteors.splice(j, 1);
                        if(!specialActive && meteorDestroyed < 50) meteorDestroyed++;
                        break;
                    }
                }
            }

            for (let i = 0; i < bullets.length; i++) {
                for (let j = 0; j < miniBosses.length; j++) {
                    let b = bullets[i], mb = miniBosses[j];
                    if (Math.abs(b.x - mb.x) < 20 && Math.abs(b.y - mb.y) < 15) {
                        createExplosion(b.x, b.y, '#e67e22', 4);
                        mb.hp -= (specialActive ? 2 : 1);
                        if (!b.pierce) { bullets.splice(i, 1); i--; }
                        if (mb.hp <= 0) {
                            createExplosion(mb.x, mb.y, '#8e44ad', 30);
                            miniBosses.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            if (boss.active) {
                for (let i = 0; i < bullets.length; i++) {
                    if (!boss.active) break;
                    
                    let b = bullets[i];
                    if (Math.abs(b.x - boss.x) < boss.width/2 && Math.abs(b.y - boss.y) < boss.height/2) {
                        createExplosion(b.x, b.y, boss.secondForm ? 'red' : 'lime', 4);
                        boss.hp -= (specialActive ? 2 : 1); 
                        if (!b.pierce) { bullets.splice(i, 1); i--; }
                        
                        if (boss.hp <= 0 && boss.active) {
                            boss.active = false; 
                            createExplosion(boss.x, boss.y, 'white', 150);
                            endGame(true);
                            break; 
                        }
                    }
                }
            }

            if (player.invulnerable <= 0 && player.forcefield <= 0) { 
                let hitByMeteor = false;
                let hitByBossBullet = false;

                for (let i = 0; i < meteors.length; i++) {
                    if (Math.abs(player.x - meteors[i].x) < meteors[i].radius + 10 && Math.abs(player.y - meteors[i].y) < meteors[i].radius + 10) {
                        hitByMeteor = true; meteors.splice(i, 1); break;
                    }
                }
                if (!hitByMeteor) {
                    for (let i = 0; i < bossBullets.length; i++) {
                        if (Math.abs(player.x - bossBullets[i].x) < bossBullets[i].radius + 10 && Math.abs(player.y - bossBullets[i].y) < bossBullets[i].radius + 10) {
                            hitByBossBullet = true; bossBullets.splice(i, 1); break;
                        }
                    }
                }

                if (hitByMeteor || hitByBossBullet) {
                    if (hitByMeteor) {
                        lives -= 1; 
                    } else if (hitByBossBullet) {
                        lives -= (level <= 5) ? 0.5 : 1; 
                    }

                    player.invulnerable = 60;
                    createExplosion(player.x, player.y, 'red', 20);
                    if (lives <= 0) endGame(false);
                }
            }
        }

        function createExplosion(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                    size: Math.floor(Math.random() * 4 + 2), color: color, life: 1.0
                });
            }
        }

        function handleParticles() {
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
                ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); 
                ctx.globalAlpha = 1.0;
                if (p.life <= 0) { particles.splice(i, 1); i--; }
            }
        }

        function endGame(isVictory) {
            gameState = isVictory ? 'victory' : 'gameover';
            msgScreen.style.display = 'block'; updateUI();
            
            if (isVictory) {
                if(level === 10) {
                    titleText.innerText = "EVREN KURTARILDI!"; titleText.style.color = "cyan";
                    subText.innerText = `Tum bosslari yendin!\n\nSen gercek bir efsanesin!`;
                    restartBtn.style.display = 'inline-block'; nextLevelBtn.style.display = 'none';
                } else {
                    titleText.innerText = "BOSS YOK EDILDI!"; titleText.style.color = "lime";
                    subText.innerText = `${boss.name} artik senin safinda savasacak!\n\nLevel ${level} tamamlandi.`;
                    restartBtn.style.display = 'none'; nextLevelBtn.style.display = 'inline-block';
                    allies.push({ level: level, x: player.x, y: player.y });
                }
            } else {
                titleText.innerText = "OYUN BITTI"; titleText.style.color = "red";
                subText.innerText = `Uzay gemin paramparca oldu...\nUlasilan Level: ${level}`;
                restartBtn.style.display = 'inline-block'; nextLevelBtn.style.display = 'none';
            }
        }

        function animate() {
            window.animationId = requestAnimationFrame(animate);
            if (gameState !== 'playing') return;
            frameCount++;
            
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if(Math.random() < 0.1) { ctx.fillStyle = 'white'; ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2); }

            // LEVEL 4 EASTER EGG ÇİZİMİ (Meteorların arkasında kalması için en başta çizilir)
            if (level === 4 && level4EasterEggTimer > 0) {
                level4EasterEggTimer--;
                ctx.fillStyle = `rgba(255, 50, 50, ${Math.min(0.4, level4EasterEggTimer / 100)})`; // Yavaşça kaybolma efekti
                ctx.font = '35px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText("KANKA", canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillText("TELEFONU AÇ AW", canvas.width / 2, canvas.height / 2 + 20);
            }

            handleAllies(); 
            handlePlayer();
            handleMiniBosses();
            handleProjectiles();
            handleMeteors();
            handleBoss();
            checkCollisions();
            handleParticles();
            
            if(frameCount % 10 === 0) updateUI(); 
        }

        initGame();
    </script>
</body>
</html>
